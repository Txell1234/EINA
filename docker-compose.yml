# EINA — Intel·ligència Estratègica
# Arrenca tota la plataforma amb: docker compose up --build
# Primera arrencada: docker compose up --build (tarda 3-5 min)
# Arrencades posteriors: docker compose up

services:

  backend:
    build: ./backend
    container_name: eina-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      Q2FS_STEP_CACHE_BACKEND: ${Q2FS_STEP_CACHE_BACKEND:-memory}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - eina-db:/app/data
      - eina-reports:/app/reports
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: eina-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: eina-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles: ["observability", "full"]

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: eina-prometheus
    restart: unless-stopped
    volumes:
      - ./backend/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/observability/alerts:/etc/prometheus/alerts:ro
    ports:
      - "9090:9090"
    profiles: ["observability", "full"]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: eina-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./backend/observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./backend/observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./backend/observability/grafana/dashboards/json:/etc/grafana/provisioning/dashboards/json:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger
    profiles: ["observability", "full"]

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    container_name: eina-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    profiles: ["observability", "full"]

  loki:
    image: grafana/loki:3.2.0
    container_name: eina-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./backend/observability/loki-config.yml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    profiles: ["observability", "full"]

  promtail:
    image: grafana/promtail:3.2.0
    container_name: eina-promtail
    restart: unless-stopped
    volumes:
      - ./backend/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    profiles: ["observability", "full"]

volumes:
  eina-db:
  eina-reports:

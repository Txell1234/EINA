# Stack complet: Redis + observabilitat + backend amb cache i traces
# Ús: docker compose -f docker-compose.yml -f docker-compose.full.yml --profile full up --build

services:
  backend:
    depends_on:
      redis:
        condition: service_started
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      Q2FS_STEP_CACHE_BACKEND: redis
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_TRACES_SAMPLER_RATE: "0.25"
      STRUCTURED_LOGGING: "true"

  prometheus:
    depends_on:
      backend:
        condition: service_healthy
